<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönlendiriliyor | Teknoify</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background-color: #09090b;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Inter Tight', sans-serif;
            flex-direction: column;
            gap: 15px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="spinner"></div>
    <div style="color: #a1a1aa; font-size: 0.9rem;">Yetkileriniz kontrol ediliyor...</div>

    <script type="module">
        import { requireAuth } from "/dashboard/shared/auth.js";

        async function routeUser() {
            try {
                // Senin yazdığın requireAuth() fonksiyonu Firebase oturumunu bekleyip 
                // bize içinde isAdmin bilgisi olan 'session' objesini hazır getiriyor.
                const session = await requireAuth();
                
                if (session) {
                    // Yetki kontrolü yapıyoruz ve fırlatıyoruz!
                    if (session.isAdmin === true || session.role?.type === "admin") {
                        window.location.replace("/dashboard/admin.html");
                    } else {
                        window.location.replace("/dashboard/member.html");
                    }
                } else {
                    // Eğer requireAuth oturum bulamazsa null döner, login'e atarız.
                    window.location.replace("/login.html");
                }
            } catch (error) {
                console.error("Yönlendirme sırasında hata oluştu:", error);
                window.location.replace("/login.html");
            }
        }

        // Sistemi başlat
        routeUser();
    </script>
</body>
</html>
