<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönlendiriliyor | Teknoify</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background-color: #09090b;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Inter Tight', sans-serif;
            flex-direction: column;
            gap: 20px;
        }
        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .text { color: #a1a1aa; font-size: 0.95rem; font-weight: 500; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <div class="spinner"></div>
    <div class="text">Yetkileriniz kontrol ediliyor, lütfen bekleyin...</div>

    <script type="module" src="/dashboard/shared/auth.js?v=999"></script>

    <script>
        // auth.js çalışıp USER_SESSION'ı doldurduğunda yakala
        const checkAuth = setInterval(() => {
            if (window.USER_SESSION) {
                clearInterval(checkAuth);
                
                // Senin auth.js dosyan isAdmin bilgisini doğrudan buraya veriyor
                if (window.USER_SESSION.isAdmin === true) {
                    window.location.replace("/dashboard/admin.html");
                } else {
                    window.location.replace("/dashboard/member.html");
                }
            }
        }, 100); // Saniyede 10 kez kontrol et (Anında yönlendirme için)

        // Güvenlik önlemi: Eğer 5 saniye içinde Firebase yanıt vermezse login'e geri at
        setTimeout(() => {
            if (!window.USER_SESSION) {
                window.location.replace("/login.html");
            }
        }, 5000);
    </script>

</body>
</html>
