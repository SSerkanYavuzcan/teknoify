<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Panel | Teknoify</title>
    
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { background: #050505; color: #fff; padding: 50px; text-align: center; font-family: sans-serif; }
        .dashboard-card { border: 1px solid #f59e0b; padding: 40px; border-radius: 20px; background: #111; max-width: 600px; margin: 0 auto; }
        h1 { color: #f59e0b; margin-bottom: 20px; }
        .btn { cursor: pointer; padding: 10px 20px; border-radius: 5px; }
        .btn-outline { background: transparent; color: #f59e0b; border: 1px solid #f59e0b; }
        .btn-outline:hover { background: #f59e0b; color: #111; }
    </style>
</head>
<body>
    <div class="dashboard-card">
        <h1><i class="fas fa-crown"></i> PREMIUM PANEL</h1>
        <p id="welcome-text">Oturum kontrol ediliyor...</p>
        <hr style="border-color: #333; margin: 20px 0;">
        <button id="logout-btn" class="btn btn-outline" style="display: none;">Çıkış Yap</button>
    </div>

    <script type="module">
        import { requireAuth, logout } from "../js/lib/auth.js";

        document.addEventListener("DOMContentLoaded", async () => {
            const session = await requireAuth({ allowedRoles: ["admin", "premium"] });

            if (!session) return; 

            const welcomeText = document.getElementById("welcome-text");
            if (welcomeText) {
                welcomeText.textContent = `Hoş geldin VIP Üye, ${session.name}. Özel raporlarına buradan erişebilirsin.`;
            }

            const logoutBtn = document.getElementById("logout-btn");
            if (logoutBtn) {
                logoutBtn.style.display = "inline-block";
                logoutBtn.addEventListener("click", async () => {
                    logoutBtn.disabled = true;
                    logoutBtn.textContent = "Çıkış yapılıyor...";
                    await logout();
                });
            }
        });
    </script>
</body>
</html>
