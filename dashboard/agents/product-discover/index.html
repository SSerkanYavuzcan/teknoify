<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Discover | Teknoify Agents</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <link rel="stylesheet" href="/css/dashboard.css?v=20260502">
  <link rel="stylesheet" href="/dashboard/agents/css/agent-main.css?v=1">
  
  <style>
    /* ========================================================= */
    /* TEMEL YAPI VE DİNAMİK EKRAN ORANLAMASI */
    /* ========================================================= */
    body { background-color: #05080a; margin: 0; padding: 0; overflow: hidden; height: 100vh; }

    .main-content {
      height: 100vh !important;
      display: flex !important;
      flex-direction: column !important;
      box-sizing: border-box !important;
      overflow: hidden !important;
    }

    .top-bar {
      position: relative !important; 
      flex: 0 0 auto !important; 
      width: 100% !important;
      background: #05080a !important;
      padding: 20px 30px !important;
      display: flex !important;
      justify-content: space-between !important;
      align-items: center !important;
      box-sizing: border-box !important;
      border-bottom: 1px solid rgba(255,255,255,0.05); 
      z-index: 100 !important;
    }

    /* Sağ sütun (Chat) kendi içinde kayacağı için genel kaydırmayı gizliyoruz */
    .content-scroll {
      -ms-overflow-style: none;
      scrollbar-width: none;
      flex: 1 1 auto !important; 
      overflow: hidden !important; 
      width: 100% !important;
      display: flex !important;
      flex-direction: column !important;
      align-items: center !important; 
      box-sizing: border-box !important;
    }

    /* Profil Alanı Stilleri */
    .user-profile { display: flex; align-items: center; gap: 12px; }
    .top-avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 1.1rem; }
  </style>
</head>
<body>

  <div id="tk-global-sidebar-root"></div>

  <main class="main-content">
    
    <header class="top-bar">
      <h2 style="font-weight: 600; margin: 0; color: #fff; font-size: 1.4rem;">Product Discover <span style="color: #71717a; font-size: 1rem; font-weight:400; margin-left:10px;">| AI Agent</span></h2>
      <div class="user-profile" style="cursor: pointer; padding: 5px 10px; border-radius: 8px; transition: background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.background='transparent'" onclick="if(window.SharedProfileManager) window.SharedProfileManager.openModal()">
        <span id="user-name-display" style="font-weight: 500; color: #e4e4e7; font-size: 0.95rem;">Yükleniyor...</span>
        <div class="top-avatar" id="user-avatar" style="background:#6366f1;">U</div>
        <i class="fas fa-chevron-down" style="color: #71717a; font-size: 0.8rem; margin-left: 5px;"></i>
      </div>
    </header>

    <div class="content-scroll" style="opacity: 0; transition: opacity 0.5s; padding: 20px 30px !important; height: 100%;" id="agent-main-view">
      
      <div class="agent-dashboard-wrapper">
        
        <div class="agent-main-col">
            
            <div class="agent-stats-grid">
                <div class="agent-summary-card">
                    <div class="agent-summary-icon" style="color: #a855f7; background: rgba(168,85,247,0.1);"><i class="fas fa-satellite-dish"></i></div>
                    <div class="agent-summary-info"><span>Aktif Tarama Oturumları</span><strong id="kpi-sessions">6</strong></div>
                </div>
                <div class="agent-summary-card">
                    <div class="agent-summary-icon" style="color: #3b82f6; background: rgba(59,130,246,0.1);"><i class="fas fa-globe"></i></div>
                    <div class="agent-summary-info"><span>Toplam Taranan Site</span><strong id="kpi-sites">1.240</strong></div>
                </div>
                <div class="agent-summary-card">
                    <div class="agent-summary-icon" style="color: #10b981; background: rgba(16,185,129,0.1);"><i class="fas fa-box-open"></i></div>
                    <div class="agent-summary-info"><span>Bugün Keşfedilen Ürün</span><strong id="kpi-products">148</strong></div>
                </div>
                <div class="agent-summary-card">
                    <div class="agent-summary-icon" style="color: #f59e0b; background: rgba(245,158,11,0.1);"><i class="fas fa-check-circle"></i></div>
                    <div class="agent-summary-info"><span>Başarı Oranı</span><strong id="kpi-success">%98.6</strong></div>
                </div>
                <div class="agent-summary-card">
                    <div class="agent-summary-icon" style="color: #ef4444; background: rgba(239,68,68,0.1);"><i class="fas fa-wallet"></i></div>
                    <div class="agent-summary-info"><span>Tahmini Maliyet</span><strong id="kpi-cost" style="color: #ef4444;">₺120.50</strong></div>
                </div>
            </div>

            <div id="dynamic-widgets-area">
                </div>

        </div>
        
        <div class="agent-chat-col">
            <div class="chat-panel">
                <div class="chat-header">
                    <div class="chat-header-info">
                        <div class="chat-header-icon"><i class="fas fa-search-dollar"></i></div>
                        <div>
                            <h3 class="chat-header-title">Product Discover</h3>
                            <p class="chat-header-desc">AI Asistan</p>
                        </div>
                    </div>
                    <div class="chat-actions">
                        <button><i class="fas fa-search"></i></button>
                        <button><i class="fas fa-ellipsis-v"></i></button>
                    </div>
                </div>
                
                <div class="chat-body" id="chat-container">
                    <div class="msg system">
                        <div class="msg-header"><div class="msg-avatar system"><i class="fas fa-robot"></i></div></div>
                        <div class="msg-bubble">
                            Merhaba <strong id="chat-user-name">Kullanıcı</strong>! 👋<br>
                            Product Discover ajanınız şu anda aktif. Size nasıl yardımcı olabilirim?
                            
                            <div class="chat-suggestions">
                                <button class="suggestion-btn" onclick="document.getElementById('agent-input').value='Ajan raporunu göster'; window.sendMessage();"><i class="far fa-file-alt"></i> Ajan raporunu göster</button>
                                <button class="suggestion-btn" onclick="document.getElementById('agent-input').value='Yeni site taraması başlat'; window.sendMessage();"><i class="fas fa-play"></i> Yeni site taraması başlat</button>
                                <button class="suggestion-btn" onclick="document.getElementById('agent-input').value='Hedef kategori ekle'; window.sendMessage();"><i class="fas fa-plus"></i> Hedef kategori ekle</button>
                                <button class="suggestion-btn" onclick="document.getElementById('agent-input').value='Ayarları aç'; window.sendMessage();"><i class="fas fa-cog"></i> Ayarları aç</button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="chat-input-area">
                    <div class="chat-input-box">
                        <textarea id="agent-input" placeholder="Ajan için bir komut yazın..." oninput="this.style.height = '20px'; this.style.height = this.scrollHeight + 'px'"></textarea>
                    </div>
                    <button class="chat-btn-send" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>

      </div>

    </div>
  </main>

  <script type="module" src="/dashboard/shared/sidebar.js"></script>
  <script type="module" src="/dashboard/shared/profile-manager.js"></script>

  <script type="module">
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js"; 

    const auth = getAuth();
    const db = getFirestore(); 

    // AJAN ID'Sİ
    const CURRENT_AGENT_ID = "product-discover";

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDocRef = doc(db, "users", user.uid);
            const userDocSnap = await getDoc(userDocRef);
            
            if (!userDocSnap.exists()) {
                window.location.href = "/dashboard/member.html";
                return;
            }

            const rootData = userDocSnap.data() || {};
            const userData = rootData.data || rootData || {};
            
            // 1. KİMLİK BİLGİLERİ VE EKRANA BASMA
            let name = user.displayName || user.email.split('@')[0] || "Kullanıcı";
            if (userData.profile && userData.profile.fullName) name = userData.profile.fullName;

            document.getElementById("user-name-display").textContent = name;
            document.getElementById("chat-user-name").textContent = name;

            const avatarEl = document.getElementById("user-avatar");
            if (userData.profile && userData.profile.photoURL) {
                avatarEl.innerHTML = `<img src="${userData.profile.photoURL}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`;
                avatarEl.style.background = 'transparent';
            } else {
                avatarEl.innerHTML = name.charAt(0).toUpperCase();
            }

            // 2. GÜVENLİK VE YETKİ KONTROLÜ
            const agentAccess = userData.agentAccess || rootData.agentAccess || {};
            const roleType = (userData.role && typeof userData.role === 'object') ? userData.role.type : (userData.role || 'member');
            const idTokenResult = await user.getIdTokenResult();
            const isAdmin = idTokenResult.claims.admin || roleType === 'admin';

            // Eğer Admin değilse ve yetkisi yoksa geri fırlat
            if (!isAdmin && agentAccess[CURRENT_AGENT_ID] !== true) {
                window.location.href = "/dashboard/member.html"; 
                return;
            }

            // YETKİ ONAYLANDI: EKRANI GÖSTER
            window.USER_SESSION = { uid: user.uid, name: name, email: user.email, isAdmin: isAdmin };
            if(typeof window.TK_RENDER_SIDEBAR === "function") window.TK_RENDER_SIDEBAR();
            
            document.getElementById("agent-main-view").style.opacity = "1";

        } else {
            window.location.href = "/"; 
        }
    });

    // MESAJ GÖNDERME SİMÜLASYONU (Yeni class yapılarına uyarlandı)
    window.sendMessage = function() {
        const input = document.getElementById("agent-input");
        const text = input.value.trim();
        if(!text) return;

        const container = document.getElementById("chat-container");
        
        // Kullanıcı Mesajını Ekle
        const userMsg = document.createElement("div");
        userMsg.className = "msg user";
        userMsg.innerHTML = `
            <div class="msg-bubble">${text.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</div>
        `;
        container.appendChild(userMsg);
        
        input.value = "";
        input.style.height = "20px"; // Input kutusunu resetle
        container.scrollTop = container.scrollHeight;

        // Ajanın "Düşünüyor..." animasyonu
        setTimeout(() => {
            const botMsg = document.createElement("div");
            botMsg.className = "msg system";
            botMsg.innerHTML = `
                <div class="msg-header"><div class="msg-avatar system"><i class="fas fa-robot"></i></div></div>
                <div class="msg-bubble" style="color:#a1a1aa;"><i>Veriler analiz ediliyor, lütfen bekleyin...</i></div>
            `;
            container.appendChild(botMsg);
            container.scrollTop = container.scrollHeight;
        }, 500);
    }

    // Enter tuşu ile mesaj gönderme (Shift+Enter alt satıra geçer)
    document.getElementById("agent-input").addEventListener("keypress", function(e) {
        if(e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            window.sendMessage();
        }
    });
  </script>
</body>
</html>
