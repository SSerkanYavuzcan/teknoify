name: Extract Stock Document Text

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Extraction mode"
        type: choice
        options:
          - dry-run
          - normal
          - force
        default: dry-run
      company:
        description: "Optional companyKey filter, for example mgros"
        required: false
        type: string
      document_id:
        description: "Optional documentId filter"
        required: false
        type: string
      strict:
        description: "Fail on warnings"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: extract-stock-document-text
  cancel-in-progress: false

jobs:
  extract-text:
    name: Extract PDF text
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-rag.txt ]; then
            python -m pip install -r requirements-rag.txt
          else
            python -m pip install pypdf
          fi

      - name: Compile extraction script
        run: python -m py_compile scripts/extract-stock-document-text.py

      - name: Run dry-run extraction
        if: ${{ inputs.mode == 'dry-run' || inputs.mode == 'normal' }}
        shell: bash
        env:
          COMPANY: ${{ inputs.company }}
          DOCUMENT_ID: ${{ inputs.document_id }}
          STRICT: ${{ inputs.strict }}
        run: |
          args=()

          if [ -n "$COMPANY" ]; then
            args+=("--company=$COMPANY")
          fi

          if [ -n "$DOCUMENT_ID" ]; then
            args+=("--document-id=$DOCUMENT_ID")
          fi

          if [ "$STRICT" = "true" ]; then
            args+=("--strict")
          fi

          python scripts/extract-stock-document-text.py --dry-run "${args[@]}"

      - name: Run normal extraction
        if: ${{ inputs.mode == 'normal' }}
        shell: bash
        env:
          COMPANY: ${{ inputs.company }}
          DOCUMENT_ID: ${{ inputs.document_id }}
          STRICT: ${{ inputs.strict }}
        run: |
          args=()

          if [ -n "$COMPANY" ]; then
            args+=("--company=$COMPANY")
          fi

          if [ -n "$DOCUMENT_ID" ]; then
            args+=("--document-id=$DOCUMENT_ID")
          fi

          if [ "$STRICT" = "true" ]; then
            args+=("--strict")
          fi

          python scripts/extract-stock-document-text.py "${args[@]}"

      - name: Run force extraction
        if: ${{ inputs.mode == 'force' }}
        shell: bash
        env:
          COMPANY: ${{ inputs.company }}
          DOCUMENT_ID: ${{ inputs.document_id }}
          STRICT: ${{ inputs.strict }}
        run: |
          args=()

          if [ -n "$COMPANY" ]; then
            args+=("--company=$COMPANY")
          fi

          if [ -n "$DOCUMENT_ID" ]; then
            args+=("--document-id=$DOCUMENT_ID")
          fi

          if [ "$STRICT" = "true" ]; then
            args+=("--strict")
          fi

          python scripts/extract-stock-document-text.py --force "${args[@]}"

      - name: Validate generated JSON outputs
        if: ${{ inputs.mode == 'normal' || inputs.mode == 'force' }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          paths = [Path("data/stock/turkey/text-extraction-catalog.json")]
          paths.extend(sorted(Path("data/stock/turkey/extracted-text").glob("*.json")))

          for path in paths:
              with path.open("r", encoding="utf-8") as file:
                  json.load(file)
              print(f"Validated {path.as_posix()}")
          PY

      - name: Commit generated extraction outputs
        if: ${{ inputs.mode == 'normal' || inputs.mode == 'force' }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/stock/turkey/extracted-text data/stock/turkey/text-extraction-catalog.json

          if git diff --cached --quiet -- data/stock/turkey/extracted-text data/stock/turkey/text-extraction-catalog.json; then
            echo "No extracted text changes to commit."
            exit 0
          fi

          git commit -m "chore(rag): extract stock document text"
          git push
